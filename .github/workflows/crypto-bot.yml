name: Monitor de Precio Bitcoin

on:
  schedule:
    # Se ejecuta cada 2 horas, todos los días del año (24/7)
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  track-crypto:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Decidir actividad
        run: |

          NUM_COMMITS=$((RANDOM % 4))
          
          if [ $NUM_COMMITS -eq 0 ]; then
            echo "El bot decidió no realizar commits en esta franja horaria."
            exit 0
          fi

          for i in $(seq 1 $NUM_COMMITS); do
            RESPONSE=$(curl -s "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd")
            BTC_PRICE=$(echo $RESPONSE | jq -r '.bitcoin.usd')
            ETH_PRICE=$(echo $RESPONSE | jq -r '.ethereum.usd')
            FECHA=$(date +'%Y-%m-%d %H:%M:%S')

            if [ ! -f historial_precios.md ]; then
              echo "# 📈 Historial de Criptomonedas" > historial_precios.md
              echo "| Fecha y Hora | Activo | Precio (USD) |" >> historial_precios.md
              echo "|---|---|---|" >> historial_precios.md
            fi

            echo "| $FECHA | ₿ Bitcoin | $BTC_PRICE USD |" >> historial_precios.md
            echo "| $FECHA | Ξ Ethereum | $ETH_PRICE USD |" >> historial_precios.md
            
            git config --global user.name "AbelMachaca"
            git config --global user.email "107734261+AbelMachaca@users.noreply.github.com"
            git add historial_precios.md
            git commit --author="AbelMachaca <107734261+AbelMachaca@users.noreply.github.com>" -m "update: registro técnico de mercado ($i/$NUM_COMMITS)" || exit 0
            
            sleep 15
          done

      - name: Subir cambios
        run: |
                # Solo necesitamos hacer el push, porque los commits ya se hicieron arriba
                git push origin main