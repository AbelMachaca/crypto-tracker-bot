name: Monitor de Precio Bitcoin

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  track-crypto:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Decidir actividad y actualizar
        run: |
          
          NUM_COMMITS=$((RANDOM % 3))
          
          if [ $NUM_COMMITS -eq 0 ]; then
            echo "Esta vez el bot no hará cambios."
            exit 0
          fi

          for i in $(seq 1 $NUM_COMMITS); do
            # Consultar API
            RESPONSE=$(curl -s "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd")
            BTC_PRICE=$(echo $RESPONSE | jq -r '.bitcoin.usd')
            ETH_PRICE=$(echo $RESPONSE | jq -r '.ethereum.usd')
            FECHA=$(date +'%Y-%m-%d %H:%M:%S')

            # Crear archivo si no existe
            if [ ! -f historial_precios.md ]; then
              echo "# 📈 Historial de Criptomonedas" > historial_precios.md
              echo "| Fecha y Hora | Activo | Precio (USD) |" >> historial_precios.md
              echo "|---|---|---|" >> historial_precios.md
            fi

            # Agregar datos
            echo "| $FECHA | ₿ Bitcoin | $BTC_PRICE USD |" >> historial_precios.md
            echo "| $FECHA | Ξ Ethereum | $ETH_PRICE USD |" >> historial_precios.md
            
            # Configurar git y hacer commit por cada iteración
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add historial_precios.md
            git commit -m "update: registro técnico de mercado ($i/$NUM_COMMITS)"
            
            # Esperar un poco entre commits para que la hora sea distinta
            sleep 10
          done

      - name: Subir cambios
        run: git push